name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: HTTPS base URL of the deployed EnergyLossPlus API
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust and iOS build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: unsigned-ios

      - name: Install dependencies
        run: npm ci

      - name: Configure API URL
        env:
          API_BASE_URL: ${{ inputs.api_base_url || vars.API_BASE_URL }}
        run: |
          API_BASE_URL="$(printf '%s' "$API_BASE_URL" | xargs)"
          API_BASE_URL="${API_BASE_URL%/}"
          if [[ "$API_BASE_URL" != https://* ]]; then
            echo "::error::Set the API_BASE_URL repository variable or workflow input to the ap-northeast-1 API URL."
            exit 1
          fi
          if [[ "$API_BASE_URL" == *"{"* || "$API_BASE_URL" == *"}"* || "$API_BASE_URL" == *"proxy+"* ]]; then
            echo "::warning::Removing the API Gateway route placeholder from API_BASE_URL."
            API_BASE_URL="${API_BASE_URL%%/\{proxy+\}*}"
          fi
          echo "Using API_BASE_URL=$API_BASE_URL"
          echo "VITE_API_BASE_URL=$API_BASE_URL" >> "$GITHUB_ENV"
          echo "ENERGY_API_BASE_URL=$API_BASE_URL" >> "$GITHUB_ENV"

      - name: Initialize iOS project
        working-directory: apps/desktop
        run: npx tauri ios init --ci

      - name: Install and verify custom iOS app icon
        run: |
          APPICONSET="$(find apps/desktop/src-tauri/gen/apple -type d -name 'AppIcon.appiconset' -print -quit)"
          test -n "$APPICONSET"
          cp apps/desktop/src-tauri/icons/ios/*.png "$APPICONSET/"
          SOURCE_HASH="$(shasum -a 256 apps/desktop/src-tauri/icons/ios/AppIcon-512@2x.png | awk '{print $1}')"
          INSTALLED_HASH="$(shasum -a 256 "$APPICONSET/AppIcon-512@2x.png" | awk '{print $1}')"
          test "$SOURCE_HASH" = "$INSTALLED_HASH"
          echo "Installed custom AppIcon into $APPICONSET"

      - name: Build unsigned IPA
        working-directory: apps/desktop
        run: npx tauri ios build --no-sign

      - name: Inject and verify iOS callback URL scheme
        run: |
          IPA="$(find apps/desktop/src-tauri/gen/apple/build -type f -name '*.ipa' -print -quit)"
          test -n "$IPA"
          rm -rf /tmp/energylossplus-ipa
          mkdir -p /tmp/energylossplus-ipa
          unzip -q "$IPA" -d /tmp/energylossplus-ipa
          PLISTS=(/tmp/energylossplus-ipa/Payload/*.app/Info.plist)
          PLIST="${PLISTS[0]}"
          test -f "$PLIST"
          python3 - "$PLIST" <<'PY'
          import plistlib
          import sys

          path = sys.argv[1]
          with open(path, "rb") as file:
              info = plistlib.load(file)
          info["CFBundleURLTypes"] = [{
              "CFBundleURLName": "com.energylossplus.desktop",
              "CFBundleURLSchemes": ["energylossplus"],
          }]
          with open(path, "wb") as file:
              plistlib.dump(info, file, fmt=plistlib.FMT_BINARY)
          with open(path, "rb") as file:
              assert plistlib.load(file)["CFBundleURLTypes"][0]["CFBundleURLSchemes"] == ["energylossplus"]
          PY
          rm "$IPA"
          (
            cd /tmp/energylossplus-ipa
            zip -qry "$GITHUB_WORKSPACE/$IPA" Payload
          )
          rm -rf /tmp/energylossplus-final
          mkdir -p /tmp/energylossplus-final
          unzip -q "$IPA" -d /tmp/energylossplus-final
          FINAL_PLISTS=(/tmp/energylossplus-final/Payload/*.app/Info.plist)
          FINAL_PLIST="${FINAL_PLISTS[0]}"
          test -f "$FINAL_PLIST"
          python3 - "$FINAL_PLIST" <<'PY'
          import plistlib
          import sys

          with open(sys.argv[1], "rb") as file:
              info = plistlib.load(file)
          assert info["CFBundleURLTypes"][0]["CFBundleURLSchemes"] == ["energylossplus"]
          print("Verified URL scheme:", info["CFBundleURLTypes"][0]["CFBundleURLSchemes"][0])
          PY

      - name: Collect IPA
        run: |
          mkdir -p artifacts
          find apps/desktop/src-tauri/gen/apple/build -type f -name "*.ipa" -exec cp {} artifacts/ \;
          test -n "$(find artifacts -type f -name '*.ipa' -print -quit)"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: EnergyLossPlus-unsigned-ios
          path: artifacts/*.ipa
          if-no-files-found: error
          retention-days: 14
